<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona 3 Reload — Weekly Schedule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --glass: rgba(14, 38, 82, 0.30);
            --glass-strong: rgba(200, 230, 255, 0.16);
            --edge: rgba(200, 235, 255, 0.45);
            --edge-soft: rgba(180, 220, 255, 0.18);
            --divider: rgba(190, 230, 255, 0.22);
            --ink: #f3fbff;
            --ink-dim: rgba(220, 240, 255, 0.70);
            --accent: #54e0ff;
            --accent-deep: #1c7fd6;
            --entry: rgba(40, 120, 200, 0.28);
            --entry-edge: rgba(120, 215, 255, 0.55);
            --link: #9be9ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, rgba(5, 20, 55, 0.20), rgba(5, 15, 45, 0.55)),
            url("assets/p3r-main-menu-bg.jpg") center/cover fixed no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .panel {
            width: 100%;
            max-width: 1500px;
            background: var(--glass);
            backdrop-filter: blur(22px) saturate(140%);
            -webkit-backdrop-filter: blur(22px) saturate(140%);
            border: 1px solid var(--edge);
            border-radius: 32px;
            box-shadow: 0 24px 70px rgba(0, 25, 70, 0.45),
            inset 0 1px 0 rgba(255, 255, 255, 0.25);
            padding: 40px 36px 48px;
            position: relative;
            overflow: hidden;
        }

        /* faint sheen sweeping the glass */
        .panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(115deg, rgba(255, 255, 255, 0.10) 0%, transparent 35%);
            pointer-events: none;
        }

        .panel h1 {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-size: 0.95rem;
            color: var(--accent);
            margin-bottom: 28px;
            padding-left: 4px;
            text-shadow: 0 0 18px rgba(84, 224, 255, 0.45);
        }

        .week {
            display: grid;
            grid-template-columns:repeat(7, 1fr);
        }

        .day {
            padding: 0 14px;
            border-left: 1px solid var(--divider);
            min-height: 520px;
            opacity: 0;
            transform: translateY(14px);
            animation: rise 0.6s cubic-bezier(.2, .7, .2, 1) forwards;
        }

        .day:first-child {
            border-left: none;
        }

        /* day header box (glass chip) */
        .day-name {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-align: center;
            padding: 11px 8px;
            background: var(--glass-strong);
            border: 1px solid var(--edge);
            border-radius: 12px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), 0 4px 14px rgba(0, 30, 80, 0.25);
            margin-bottom: 22px;
        }

        /* time-of-day = heading only, NO box */
        .slot-label {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 500;
            font-size: 0.82rem;
            letter-spacing: 0.07em;
            color: var(--ink-dim);
            text-transform: uppercase;
            margin: 18px 0 9px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--edge-soft);
        }

        .slot:first-of-type .slot-label {
            margin-top: 0;
        }

        /* character entry (glass chip) */
        .entry {
            background: var(--entry);
            border: 1px solid var(--entry-edge);
            border-radius: 9px;
            padding: 8px 11px;
            margin-bottom: 8px;
            font-size: 0.86rem;
            font-weight: 500;
            line-height: 1.25;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18), 0 3px 10px rgba(0, 30, 80, 0.22);
            transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
        }

        .entry:hover {
            transform: translateY(-2px);
            background: rgba(60, 150, 230, 0.40);
            box-shadow: 0 6px 18px rgba(0, 40, 100, 0.40), 0 0 14px rgba(84, 224, 255, 0.30);
        }

        .entry .arc {
            color: var(--link);
            font-weight: 400;
            font-size: 0.8rem;
        }

        @keyframes rise {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1100px) {
            .week {
                grid-template-columns:repeat(2, 1fr);
                gap: 8px 0;
            }

            .day {
                border-left: none;
                border-top: 1px solid var(--divider);
                padding-top: 18px;
                min-height: auto;
            }

            .day:nth-child(-n+2) {
                border-top: none;
                padding-top: 0;
            }
        }

        @media (max-width: 560px) {
            .week {
                grid-template-columns:1fr;
            }

            .day {
                border-top: 1px solid var(--divider);
                padding-top: 18px;
            }

            .day:first-child {
                border-top: none;
                padding-top: 0;
            }
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>Persona 3 Reload &mdash; Weekly Social Link Schedule</h1>
    <div class="week" id="week"></div>
</div>

<script>
    // The data structure recommended earlier: an ordered ARRAY of days,
    // each holding an ordered ARRAY of time slots. Arrays guarantee render order.
    const SLOT_ORDER = ["Daytime", "Afternoon", "After School", "Evening"];

    const schedule = [
        {
            day: "Monday", slots: {
                "After School": ["Kazuchi (Chariot)", "Yukari (Lovers)", "Hidetoshi (Emperor)", "Fuuka (Priestess)", "Mitsuru (Empress)", "Nozomi (Moon)", "Maiko (Hanged)"]
            }
        },
        {
            day: "Tuesday", slots: {
                "After School": ["Kazuchi (Chariot)", "Kenji (Magician)", "Mitsuru (Empress)", "Keisuke (Fortune)", "Bebe (Temperance)", "Chihiro (Justice)", "Elderly Couple (Hierophant)", "Nozomi (Moon)"],
                "Evening": ["Tanaka (Devil)"]
            }
        },
        {
            day: "Wednesday", slots: {
                "After School": ["Yukari (Lovers)", "Hidetoshi (Emperor)", "Yuko (Strength)", "Mitsuru (Empress)", "Keisuke (Fortune)", "Bebe (Temperance)", "Mamoru (Star)", "Elderly Couple (Hierophant)", "Nozomi (Moon)", "Maiko (Hanged)"]
            }
        },
        {
            day: "Thursday", slots: {
                "After School": ["Kazuchi (Chariot)", "Kenji (Magician)", "Yukari (Lovers)", "Mitsuru (Empress)", "Keisuke (Fortune)", "Chihiro (Justice)", "Elderly Couple (Hierophant)", "Nozomi (Moon)"],
                "Evening": ["Mutatsu (Tower)"]
            }
        },
        {
            day: "Friday", slots: {
                "After School": ["Kazuchi (Chariot)", "Kenji (Magician)", "Hidetoshi (Emperor)", "Fuuka (Priestess)", "Mitsuru (Empress)", "Bebe (Temperance)", "Mamoru (Star)", "Elderly Couple (Hierophant)", "Nozomi (Moon)"],
                "Evening": ["Mutatsu (Tower)"]
            }
        },
        {
            day: "Saturday", slots: {
                "Daytime": ["Elderly Couple (Hierophant)", "Nozomi (Moon)", "Maiko (Hanged)"],
                "After School": ["Yukari (Lovers)", "Fuuka (Priestess)", "Yuko (Strength)", "Mitsuru (Empress)", "Chihiro (Justice)"],
                "Evening": ["Tanaka (Devil)", "Mutatsu (Tower)"]
            }
        },
        {
            day: "Sunday", slots: {
                "Daytime": ["Elderly Couple (Hierophant)", "Nozomi (Moon)"],
                "Afternoon": ["Akinari (Sun)", "Maya (Hermit)"],
                "After School": ["Mamoru (Star)"],
                "Evening": ["Mutatsu (Tower)"]
            }
        }
    ];

    // Split "Name (Arcana)" -> styled name + arcana so the link reads as an accent.
    function renderEntry(str) {
        const m = str.match(/^(.*?)\s*\((.*)\)\s*$/);
        if (!m) return `<div class="entry">${str}</div>`;
        return `<div class="entry">${m[1]} <span class="arc">(${m[2]})</span></div>`;
    }

    const week = document.getElementById("week");
    schedule.forEach((d, i) => {
        const col = document.createElement("div");
        col.className = "day";
        col.style.animationDelay = (i * 0.07) + "s";

        let html = `<div class="day-name">${d.day}</div>`;
        SLOT_ORDER.forEach(slot => {
            const people = d.slots[slot] || [];
            if (!people.length) return;            // empty slot -> no subheading at all
            html += `<div class="slot"><div class="slot-label">${slot}</div>`;
            html += people.map(renderEntry).join("");
            html += `</div>`;
        });

        col.innerHTML = html;
        week.appendChild(col);
    });
</script>
</body>
</html>
